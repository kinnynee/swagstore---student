name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.14.1'

jobs:
  verify:
    name: Test and build verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          find . -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./coverage/*" \
            -exec node --check {} \;

      - name: Run Jest tests with coverage
        run: npm run test:coverage

      - name: Verify app starts
        run: |
          node -e "
            const createApp = require('./app');
            const server = createApp().listen(0, () => {
              console.log('App started on port', server.address().port);
              server.close(() => process.exit(0));
            });
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r dist/swagstore.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "coverage/*" \
            --exclude "dist/*" \
            --exclude "*.bak"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/swagstore.zip
          retention-days: 14

  deploy:
    name: Trigger Render deployment
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Read Render configuration
        id: render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Set RENDER_DEPLOY_HOOK_URL to enable Render deployment."
          fi

      - name: Deploy current commit to Render
        if: steps.render.outputs.enabled == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --show-error --silent --request POST "${RENDER_DEPLOY_HOOK_URL}&ref=${GITHUB_SHA}"
